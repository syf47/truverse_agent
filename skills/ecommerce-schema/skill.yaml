name: jd-clickhouse-schema
description: >
  京东电商 ClickHouse 数据库表结构。包含商品表(wares)、评论表(comments)、问答表(qa)
  三张核心表的完整字段定义、关联关系、分区策略和常用查询模式。
  当 Agent 需要构造 SQL 查询、分析商品数据、评论数据、问答数据时使用。
